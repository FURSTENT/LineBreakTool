<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LineBreakTool</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
        }
        .btn-group {
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>テキスト改行変換ツール</h2>
    <label for="inputText">ここにテキストをペースト：</label>
    <textarea id="inputText" placeholder="テキストを貼り付けてください..." aria-label="入力テキスト"></textarea>

    <div class="btn-group">
        <label for="targetLang">変換先言語:</label>
        <select id="targetLang" aria-label="変換先言語">
            <option value="html">HTML (br タグ)</option>
            <option value="markdown">Markdown (行末に2スペース)</option>
            <option value="escaped">エスケープ (\n 表現)</option>
            <option value="json">JSON 文字列用</option>
            <option value="url">URL エンコード (%0A)</option>
        </select>
        <button id="convertBtn">変換する</button>
    </div>

    <p>結果（ここに &lt;br&gt; 付きのテキストが出るよ）：</p>
    <textarea id="outputText" readonly placeholder="変換結果がここに表示されます..." aria-label="変換結果"></textarea>

    <div class="btn-group">
        <button id="copyBtn">結果をコピー</button>
    </div>

    <label><input type="checkbox" id="showPreview"> プレビューを表示</label>
    <p id="previewLabel" style="display:none">プレビュー（HTMLとして表示）:</p>
    <div id="preview" style="display:none; white-space: pre-wrap; border:1px solid #ddd; padding:10px; min-height:120px; background:#fff;" aria-live="polite"></div>

    <script>
        // 改行のUnicode種類に対応する正規表現
        const newlineRegex = /\r\n|[\n\r\u0085\u2028\u2029]/g;

        function convertText() {
            const input = document.getElementById('inputText').value || '';
            const br = '<br>';
            const target = document.getElementById('targetLang').value || 'html';

                let output;
                if (target === 'html') {
                    output = input.replace(newlineRegex, match => br + '\n');
                } else if (target === 'markdown') {
                    output = input.replace(newlineRegex, match => '  \n');
                } else if (target === 'escaped') {
                    // 改行を文字列内のエスケープ表現にする (\n)
                    output = input.replace(newlineRegex, match => '\\n');
                } else if (target === 'json') {
                    // JSON用にエスケープ（" と \ をエスケープ）
                    const escapedForJson = input.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
                    output = escapedForJson.replace(newlineRegex, match => '\\n');
                } else if (target === 'url') {
                    output = input.replace(newlineRegex, match => '%0A');
                } else {
                    output = input;
                }

                // wrap option removed; no additional wrapping

                document.getElementById('outputText').value = output;

                // プレビュー: HTMLターゲットのときは HTML として表示、それ以外はテキストで表示
                const preview = document.getElementById('preview');
                if (document.getElementById('showPreview').checked) {
                    if (target === 'html') {
                        const escaped = escapeHtml(input).replace(newlineRegex, br + '\n');
                        preview.innerHTML = escaped.replace(/\n/g, '<br>');
                    } else {
                        // 非HTMLはそのままテキスト表示（エスケープ済み）
                        preview.textContent = output;
                    }
                }
        }

        function escapeHtml(text) {
            return text.replace(/[&<>\"]+/g, function (s) {
                return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[s];
            });
        }

        // コピー機能
        function copyOutput() {
            const out = document.getElementById('outputText');
            out.select();
            try {
                document.execCommand('copy');
            } catch (e) {
                // フォールバック
                navigator.clipboard && navigator.clipboard.writeText(out.value);
            }
            // 非表示でのフォーカス解除
            window.getSelection().removeAllRanges();
        }

        // イベント登録
        document.getElementById('convertBtn').addEventListener('click', convertText);
        document.getElementById('copyBtn').addEventListener('click', copyOutput);

        // プレビュー表示トグル
        const showPreview = document.getElementById('showPreview');
        showPreview.addEventListener('change', function () {
            const on = this.checked;
            document.getElementById('preview').style.display = on ? 'block' : 'none';
            document.getElementById('previewLabel').style.display = on ? 'block' : 'none';
            if (on) convertText();
        });

        // Ctrl/Cmd + Enter で変換
        document.getElementById('inputText').addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                convertText();
            }
        });
    </script>
</body>
</html>
