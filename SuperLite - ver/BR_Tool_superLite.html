<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Line Break Converter</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
        }
        .btn-group {
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Text Line Break Converter</h2>
    <p>Paste your text here:</p>
    <textarea id="inputText" placeholder="Please paste your text here..."></textarea>

    <div class="btn-group">
        <button onclick="convertText()">Convert</button>
    </div>

    <p>Result:</p>
    <textarea id="outputText" readonly placeholder="Conversion result will be displayed here..."></textarea>

    <script>
        function convertText() {
            const input = document.getElementById('inputText').value;
            const output = input.replace(/\r?\n/g, '<br>\n');
            document.getElementById('outputText').value = output;
        }
    </script>

</body>
</html>
